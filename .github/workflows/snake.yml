name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"   # 每天 UTC 0点自动跑
  workflow_dispatch:        # 允许手动触发
permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      ASSET_PUBLISH_TOKEN: ${{ secrets.ASSET_PUBLISH_TOKEN || github.token }}
      ASSET_VERIFY_MIN_SIZE: 1000
      ASSET_VERIFY_SLEEP: 10
      ASSET_VERIFY_RETRIES: 5
      ASSET_VERIFY_RETRY_DELAY: 10
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: cchengoran525
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
      
      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
          keep_files: true
        env:
          GITHUB_TOKEN: ${{ env.ASSET_PUBLISH_TOKEN }}

      - name: Verify output assets
        run: |
          bash .github/scripts/verify-assets.sh \
            "https://raw.githubusercontent.com/cchengoran525/cchengoran525/output/github-contribution-grid-snake.svg" \
            "https://raw.githubusercontent.com/cchengoran525/cchengoran525/output/github-contribution-grid-snake-dark.svg"
