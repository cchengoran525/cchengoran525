name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    env:
      # 未配置 METRICS_TOKEN 时使用 GITHUB_TOKEN (仅可访问公开数据)
      METRICS_TOKEN: ${{ secrets.METRICS_TOKEN || github.token }}
      ASSET_PUBLISH_TOKEN: ${{ secrets.ASSET_PUBLISH_TOKEN || github.token }}
    steps:
      # --- 生成白天模式图片 ---
      - name: Light mode
        uses: lowlighter/metrics@latest
        with:
          token: ${{ env.METRICS_TOKEN }}
          user: cchengoran525
          filename: metrics.light.svg
          config_theme: github-light
          config_timezone: Asia/Shanghai
          base: header
          # 模块 1：语言详情（含字节大小和百分比）
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          # 模块 2：Issue 和 PR 的详细状态追踪
          plugin_followup: yes
          plugin_followup_sections: user # 专注于你个人的 PR 和 Issue 状态
          committer_branch: output  # 关键：把图片存到 output 分支
          committer_token: ${{ env.ASSET_PUBLISH_TOKEN }}

      # --- 生成黑夜模式图片 ---
      - name: Dark mode
        uses: lowlighter/metrics@latest
        with:
          token: ${{ env.METRICS_TOKEN }}
          user: cchengoran525
          filename: metrics.dark.svg
          config_theme: github-dark
          config_timezone: Asia/Shanghai
          base: header
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_followup: yes
          plugin_followup_sections: user
          committer_branch: output  # 关键：把图片存到 output 分支
          committer_token: ${{ env.ASSET_PUBLISH_TOKEN }}

      - name: Verify output assets
        run: |
          set -euo pipefail
          min_size=1000
          urls=(
            "https://raw.githubusercontent.com/cchengoran525/cchengoran525/output/metrics.light.svg"
            "https://raw.githubusercontent.com/cchengoran525/cchengoran525/output/metrics.dark.svg"
          )
          for url in "${urls[@]}"; do
            echo "Checking $url"
            tmpfile=$(mktemp)
            curl -L --retry 5 --retry-all-errors --retry-delay 10 -o "$tmpfile" "$url"
            size=$(wc -c < "$tmpfile")
            rm -f "$tmpfile"
            if [ "$size" -lt "$min_size" ]; then
              echo "Asset too small: $url ($size bytes)"
              exit 1
            fi
          done
