name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      # 生成适配【白天模式】的卡片
      - name: Light mode
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: cchengoran525
          filename: metrics.light.svg # 指定文件名
          config_timezone: Asia/Shanghai
          base: header # 基础信息（包含PR和Issue统计）
          base_sections: header # 只保留最头部的统计
          plugin_languages: yes
          plugin_languages_limit: 8
          config_order: base.header, languages # 排序：先统计再语言
          config_theme: github-light # 明亮主题

      # 生成适配【黑夜模式】的卡片
      - name: Dark mode
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: cchengoran525
          filename: metrics.dark.svg # 指定文件名
          config_timezone: Asia/Shanghai
          base: header
          base_sections: header
          plugin_languages: yes
          plugin_languages_limit: 8
          config_order: base.header, languages
          config_theme: github-dark # 黑暗主题
