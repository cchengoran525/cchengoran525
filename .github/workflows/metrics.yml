name: Metrics
on:
  # 每天凌晨 0 点自动更新
  schedule: [{cron: "0 0 * * *"}]
  # 支持手动触发更新
  workflow_dispatch:
  # 每次你往这个仓库推代码时也更新
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with: METRICS_TOKEN
          # 刚才在 Secret 里设定的名字
          token: ${{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}}
          
          # 核心配置
          user: cchengoran525
          template: classic
          base: header, community, repositories, metadata
          config_timezone: Asia/Shanghai
          
          # 展示编程语言占比
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          
          # 展示星标统计（可选）
          plugin_stars: yes
          plugin_stars_limit: 4
